version: 2
updates:
  - package-ecosystem: npm
    directory: /packages/n8n-nodes-markitdown-api
    schedule:
      interval: weekly
    ignore:
      - dependency-name: n8n-workflow
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /services/markitdown-api
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
